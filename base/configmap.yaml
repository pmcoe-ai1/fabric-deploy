# FABRIC Application ConfigMap
# Non-secret configuration — environment-specific values via overlays
apiVersion: v1
kind: ConfigMap
metadata:
  name: fabric-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
