# FABRIC Application Deployment
# Base deployment — image tag overridden by overlays
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabric
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fabric
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fabric
    spec:
      containers:
        - name: fabric
          image: ghcr.io/pmcoe-ai1/fabric:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: fabric-secrets
