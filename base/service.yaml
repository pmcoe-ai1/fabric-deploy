# FABRIC Application Service
apiVersion: v1
kind: Service
metadata:
  name: fabric
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: fabric
