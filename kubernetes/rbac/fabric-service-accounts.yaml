# FABRIC RBAC — Least-Privilege Service Accounts
# Design Reference: Section 11.2 (Runtime Security)
# Task E-05: Service accounts per component

# Staging application service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabric
  namespace: staging
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
---
# Production application service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabric
  namespace: production
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
---
# Vault snapshot service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-snapshot
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-snapshot
    app.kubernetes.io/part-of: fabric
---
# Application Role — minimal permissions for FABRIC pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fabric-app
  namespace: staging
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fabric-app
  namespace: staging
subjects:
  - kind: ServiceAccount
    name: fabric
    namespace: staging
roleRef:
  kind: Role
  name: fabric-app
  apiGroup: rbac.authorization.k8s.io
---
# Same Role/Binding for production
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fabric-app
  namespace: production
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fabric-app
  namespace: production
subjects:
  - kind: ServiceAccount
    name: fabric
    namespace: production
roleRef:
  kind: Role
  name: fabric-app
  apiGroup: rbac.authorization.k8s.io
