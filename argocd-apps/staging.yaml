# Argo CD Application — FABRIC Staging
# Design Reference: Section 6.1 (Argo CD Configuration)
# Sync policy: Automated (auto-sync, self-heal, prune)
# Sync waves: 0 (Namespace/ConfigMaps/Secrets) → 1 (DB migrations) → 2 (Immutability triggers) → 3 (App deployment) → 4 (Post-deploy hooks)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fabric-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: fabric
    fabric/environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/pmcoe-ai1/fabric-deploy.git
    targetRevision: main
    path: overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Sync waves are defined via annotations on individual resources:
  #   argocd.argoproj.io/sync-wave: "0"  — Namespace, ConfigMaps, Secrets (via ESO)
  #   argocd.argoproj.io/sync-wave: "1"  — Database migrations (Prisma migrate deploy Job)
  #   argocd.argoproj.io/sync-wave: "2"  — Immutability triggers (SQL apply Job)
  #   argocd.argoproj.io/sync-wave: "3"  — Application deployment (Deployment/Rollout)
  #   argocd.argoproj.io/sync-wave: "4"  — Post-deploy hooks (chain.js, deprecation-protocol, capability-notify)
