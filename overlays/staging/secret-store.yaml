# SecretStore — Staging Vault Backend
# Design Reference: Section 8.2 (External Secrets Operator Flow)
# Defect 18 fix: namespace-scoped SecretStore replaces ClusterSecretStore
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: staging
  labels:
    app.kubernetes.io/part-of: fabric
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "fabric-staging"
          serviceAccountRef:
            name: "fabric"
