apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: fabric
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi

configMapGenerator:
  - name: fabric-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=debug
