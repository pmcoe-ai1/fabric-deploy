# ExternalSecret — Staging Database Secret
# Design Reference: Section 8.2 (External Secrets Operator Flow)
# Syncs secret/fabric/staging/database from Vault to K8s Secret every 15s
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fabric-secrets
  namespace: staging
  labels:
    app.kubernetes.io/part-of: fabric
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: fabric-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/fabric/staging/database
        property: DATABASE_URL
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: secret/fabric/shared/anthropic
        property: ANTHROPIC_API_KEY
