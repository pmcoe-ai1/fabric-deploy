# FABRIC Production — Canary Rollout with Automated Analysis
# Design Reference: Section 6.2.2 (Production: Canary Strategy), Section 6.2.3 (Analysis Template)
# Task D-02: 4-step canary with Prometheus-based automated analysis
#
# Steps:
#   Step 1: 5% traffic, 10 min, analysis
#   Step 2: 25% traffic, 15 min, analysis
#   Step 3: 50% traffic, 15 min, analysis + GapFlag check
#   Step 4: 100% traffic (full cutover)
#   Scale down old version after 30 minutes
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fabric
  namespace: production
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: fabric
  strategy:
    canary:
      canaryService: fabric-production-canary
      stableService: fabric-production-stable
      trafficRouting:
        nginx:
          stableIngress: fabric-production
          annotationPrefix: nginx.ingress.kubernetes.io
      scaleDownDelaySeconds: 1800  # 30 minutes
      steps:
        # Step 1: 5% traffic, 10 minute pause with analysis
        - setWeight: 5
        - pause: { duration: 10m }
        - analysis:
            templates:
              - templateName: production-canary-analysis
            args:
              - name: canary-weight
                value: "5"

        # Step 2: 25% traffic, 15 minute pause with analysis
        - setWeight: 25
        - pause: { duration: 15m }
        - analysis:
            templates:
              - templateName: production-canary-analysis
            args:
              - name: canary-weight
                value: "25"

        # Step 3: 50% traffic, 15 minute pause with analysis + GapFlag check
        - setWeight: 50
        - pause: { duration: 15m }
        - analysis:
            templates:
              - templateName: production-canary-analysis
              - templateName: production-gapflag-check
            args:
              - name: canary-weight
                value: "50"

        # Step 4: 100% traffic (full cutover)
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fabric
    spec:
      serviceAccountName: fabric
      containers:
        - name: fabric
          image: ghcr.io/pmcoe-ai1/fabric:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          envFrom:
            - secretRef:
                name: fabric-secrets
---
# Stable service — receives production traffic
apiVersion: v1
kind: Service
metadata:
  name: fabric-production-stable
  namespace: production
  labels:
    app.kubernetes.io/name: fabric
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: fabric
---
# Canary service — receives canary traffic during rollout
apiVersion: v1
kind: Service
metadata:
  name: fabric-production-canary
  namespace: production
  labels:
    app.kubernetes.io/name: fabric
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: fabric
---
# Ingress for production (used by Argo Rollouts for canary annotations)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fabric-production
  namespace: production
  labels:
    app.kubernetes.io/name: fabric
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: fabric.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fabric-production-stable
                port:
                  name: http
---
# AnalysisTemplate — Canary health analysis with Prometheus
# Checks: error rate, P99 latency, contract version mismatches, lifecycle failures
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: production-canary-analysis
  namespace: production
spec:
  args:
    - name: canary-weight
  metrics:
    # Error rate: 5xx / total must be < 0.1%
    - name: error-rate
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            sum(rate(http_requests_total{namespace="production",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{namespace="production"}[5m]))
      successCondition: result[0] < 0.001
      failureLimit: 3
      interval: 60s
      count: 5

    # P99 latency must be < 500ms
    - name: p99-latency
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="production"}[5m])) by (le)
            )
      successCondition: result[0] < 0.5
      failureLimit: 3
      interval: 60s
      count: 5

    # Contract version mismatches must be 0
    - name: contract-version-mismatch
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            sum(increase(contract_version_mismatch_total{namespace="production"}[5m]))
      successCondition: result[0] == 0
      failureLimit: 1
      interval: 60s
      count: 5

    # Lifecycle transition failures must be 0
    - name: lifecycle-transition-failure
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            sum(increase(lifecycle_transition_failure_total{namespace="production"}[5m]))
      successCondition: result[0] == 0
      failureLimit: 1
      interval: 60s
      count: 5
---
# GapFlag check — runs at Step 3 (50% traffic) only
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: production-gapflag-check
  namespace: production
spec:
  metrics:
    - name: gapflag-count
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            sum(increase(gapflag_emission_total{namespace="production"}[10m]))
      successCondition: result[0] == 0
      failureLimit: 1
      interval: 120s
      count: 3
