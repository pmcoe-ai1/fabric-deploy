# Horizontal Pod Autoscaler for production
# Task 8.1: Auto-scale production based on CPU utilisation
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fabric
  namespace: production
  labels:
    app.kubernetes.io/name: fabric
    app.kubernetes.io/part-of: fabric
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: fabric
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
