apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure resources — monitoring alerts, dashboards, vault operations
# Managed by argocd-apps/infrastructure.yaml Argo CD Application
resources:
  # Monitoring — Alertmanager config and PrometheusRule alert definitions
  - monitoring/alertmanager-config.yaml
  - monitoring/loki-alerts.yaml
  - monitoring/prometheus-self-alerts.yaml
  - monitoring/tempo-alerts.yaml
  # Grafana dashboards — JSON ConfigMaps
  - dashboards/deployment-status.yaml
  - dashboards/infrastructure-health.yaml
  - dashboards/pipeline-health.yaml
  - dashboards/runtime-health.yaml
  # Vault — snapshot CronJob and alerts
  - vault/raft-snapshot-cronjob.yaml
  - vault/vault-alerts.yaml
  - vault/vault-snapshot-sa.yaml
