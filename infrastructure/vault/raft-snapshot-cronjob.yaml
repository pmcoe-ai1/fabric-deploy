# Vault Raft Snapshot CronJob
# Task J-01: Automated daily Raft snapshots to Azure Blob Storage
# Schedule: Daily at 02:00 UTC
#
# Architecture: Two containers sharing /snapshots volume.
# 1. init container (hashicorp/vault) — takes the Raft snapshot
# 2. main container (curlimages/curl) — uploads to Azure Blob Storage
#
# The hashicorp/vault image uses BusyBox wget which does not support
# PUT requests or file uploads. curlimages/curl provides full curl.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-raft-snapshot
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-snapshot
    app.kubernetes.io/part-of: fabric
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: vault-snapshot
          restartPolicy: OnFailure
          volumes:
            - name: snapshots
              emptyDir: {}
          initContainers:
            - name: take-snapshot
              image: hashicorp/vault:1.15
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  SNAPSHOT_NAME="vault-snapshot-$(date +%Y%m%d-%H%M%S).snap"
                  echo "Taking Raft snapshot: ${SNAPSHOT_NAME}"
                  vault operator raft snapshot save "/snapshots/${SNAPSHOT_NAME}"
                  echo "${SNAPSHOT_NAME}" > /snapshots/SNAPSHOT_NAME
                  echo "Snapshot saved to /snapshots/${SNAPSHOT_NAME}"
              env:
                - name: VAULT_ADDR
                  value: "http://vault.vault:8200"
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-snapshot-token
                      key: token
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          containers:
            - name: upload
              image: curlimages/curl:8.5.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  SNAPSHOT_NAME=$(cat /snapshots/SNAPSHOT_NAME)
                  echo "Uploading ${SNAPSHOT_NAME} to Azure Blob Storage"
                  curl -X PUT \
                    -H "x-ms-blob-type: BlockBlob" \
                    --data-binary "@/snapshots/${SNAPSHOT_NAME}" \
                    --fail --silent --show-error \
                    "${AZURE_BLOB_CONTAINER_URL}/${SNAPSHOT_NAME}${AZURE_SAS_TOKEN}"
                  echo "Snapshot uploaded: ${SNAPSHOT_NAME}"
              env:
                - name: AZURE_BLOB_CONTAINER_URL
                  valueFrom:
                    secretKeyRef:
                      name: vault-snapshot-azure
                      key: container_url
                - name: AZURE_SAS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-snapshot-azure
                      key: sas_token
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
